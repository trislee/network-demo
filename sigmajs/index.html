<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sigma.js network</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { display: flex; flex-direction: column; }
    #sigma-container {
      flex: 1 1 auto;
      min-height: 0;
      background: #fff;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "graphology": "https://cdn.jsdelivr.net/npm/graphology/+esm",
      "sigma": "https://cdn.jsdelivr.net/npm/sigma/+esm",
      "graphology-gexf/browser": "https://cdn.jsdelivr.net/npm/graphology-gexf/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="sigma-container"></div>

  <script type="module">
    import Graph from "graphology";
    import { parse } from "graphology-gexf/browser";
    import Sigma from "sigma";

    const NODE_SIZE_SCALE = 0.4;

    let renderer = null;

    fetch("../graphs/bipartite_podcasts_layout_threshold=1.gexf")
      .then((res) => {
        if (!res.ok) throw new Error(res.status + " " + res.statusText);
        return res.text();
      })
      .then((gexf) => {
        const graph = parse(Graph, gexf);

        graph.forEachNode((node) => {
          const size = graph.getNodeAttribute(node, "size");
          if (size != null) {
            graph.setNodeAttribute(node, "size", size * NODE_SIZE_SCALE);
          }
        });

        const container = document.getElementById("sigma-container");

        const LABEL_THRESHOLD = 25;
        renderer = new Sigma(graph, container, {
          minCameraRatio: 0.08,
          maxCameraRatio: 3,
          labelRenderedSizeThreshold: LABEL_THRESHOLD,
        });
      })
      .catch((err) => {
        document.getElementById("sigma-container").innerHTML =
          "<p style=\"padding: 1rem; color: #c00;\">Failed to load graph: " + err.message + "</p>";
      });
  </script>
</body>
</html>
