# Build the Vite app and deploy the whole site to GitHub Pages.
# Static dirs (d3, holoviews, sigmajs) are copied as-is; sigmajs-fancy is built first.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sigmajs-fancy/package-lock.json

      - name: Install and build sigmajs-fancy
        working-directory: sigmajs-fancy
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/sigmajs-fancy/
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html site/
          cp -r d3 d3*force graphs holoviews sigmajs choices site/
          mkdir -p site/sigmajs-fancy
          cp -r sigmajs-fancy/build/* site/sigmajs-fancy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
