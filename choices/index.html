<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<div class="app">
    <aside class="sidebar">
        <div class="controls">
            <div class="control-group">
                <label class="control-group__title" for="thresholdInput">Appearance threshold</label>
                <div class="control-group__body">
                    <input type="range" id="thresholdInput" name="thresholdInput" value="1" min="0" max="3"
                        oninput="thresholdOutput.value = thresholdInput.value">
                    <output id="thresholdOutput">1</output>
                </div>
                <p class="control-group__hint">Hide guests with fewer than this many<br>podcast appearances. 0 = show all.</p>
            </div>
            <div class="control-group">
                <span class="control-group__title">Graph type</span>
                <div class="control-group__body">
                    <label class="control-option"><input type="radio" name="agg" value="bipartite" checked> Bipartite</label>
                    <label class="control-option"><input type="radio" name="agg" value="guests"> Guests</label>
                </div>
            </div>
            <div class="control-group">
                <span class="control-group__title">Display</span>
                <div class="control-group__body">
                    <label class="control-option"><input type="checkbox" name="labelsInput" checked> Show Labels</label>
                    <label class="control-option"><input type="checkbox" name="edgesInput" checked> Show Edges</label>
                </div>
            </div>
            <div class="control-group">
                <button type="button">Reset</button>
            </div>
        </div>
        <div id="legend" class="legend"></div>
    </aside>
    <div class="canvas-container">
        <canvas id="networkCanvas"></canvas>
        <div id="tooltip"></div>
    </div>
</div>
<style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { overflow: hidden; }

    .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
    }
    .sidebar {
        display: flex;
        flex-direction: column;
        gap: 1em;
        flex-shrink: 0;
        padding: 0.75em;
        font: 13px sans-serif;
        background: #fafafa;
        border-bottom: 1px solid #ddd;
    }
    .controls {
        display: flex;
        flex-direction: column;
        gap: 0.75em;
    }
    .control-group {
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 0.6em 0.9em;
        background: #fff;
    }
    .control-group__title {
        display: block;
        font-weight: 600;
        color: #333;
        margin-bottom: 0.4em;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }
    .control-group__body {
        display: flex;
        flex-direction: column;
        gap: 0.35em;
    }
    .control-group__hint {
        margin: 0.35em 0 0 0;
        font-size: 11px;
        color: #666;
        line-height: 1.3;
    }
    .control-option {
        display: flex;
        align-items: center;
        gap: 0.4em;
        cursor: pointer;
    }
    .control-option input { margin: 0; }
    .legend {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5em 0.75em;
        font: 12px sans-serif;
    }
    .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 0.35em;
    }
    .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        flex-shrink: 0;
    }
    .canvas-container {
        flex: 1 1 0;
        min-height: 0;
        min-width: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #networkCanvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    div#tooltip {
        position: fixed;
        text-align: left;
        font: 12px sans-serif;
        background: white;
        padding: 5px;
        border: 1px solid #e3e3e3;
        border-radius: 5px;
        pointer-events: none;
        display: none;
    }

    @media (min-width: 769px) {
        .app { flex-direction: row; }
        .sidebar {
            flex-direction: column;
            width: 220px;
            min-width: 220px;
            border-bottom: none;
            border-right: 1px solid #ddd;
        }
        .controls { flex-direction: column; }
    }
</style>

<body>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // Load shared category colors and network data
        Promise.all([
            fetch("colors.json").then(function (r) { return r.json(); }),
            d3.json("full_network_data.json")
        ]).then(function (inputs) {
            var color = inputs[0];
            var data = inputs[1];

            var legend = document.getElementById("legend");
            var legendOrder = ["Intellectual", "Celebrity", "Podcast", "Athlete", "Politician", "Influencer", "Comedian", "Political Pundit", "Other"];
            legendOrder.forEach(function (category) {
                if (!(category in color)) return;
                var item = document.createElement("span");
                item.className = "legend-item";
                item.innerHTML = "<span class=\"legend-swatch\" style=\"background:" + color[category] + "\"></span> " + category;
                legend.appendChild(item);
            });

            var defaultColor = "#888";
            function nodeColor(category) { return color[category] || defaultColor; }
            var allNodes = data.allNodes.map((list, i) => ({
                id: i,
                label: list[0],
                views: list[1],
                category: list[2]
            }));

            const canvas = document.getElementById("networkCanvas");
            const canvasContainer = canvas.parentElement;
            const ctx = canvas.getContext("2d");
            const tooltip = document.getElementById("tooltip");

            function getSize() {
                const w = canvasContainer.clientWidth;
                const h = canvasContainer.clientHeight;
                return { width: Math.max(1, w), height: Math.max(1, h) };
            }

            function resizeCanvas() {
                const { width: w, height: h } = getSize();
                if (w <= 0 || h <= 0) return;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                    width = w;
                    height = h;
                    zoom.translateExtent([[0, 0], [width, height]]);
                }
                const agg = d3.select("input[name='agg']:checked").property("value");
                const thresholdValue = d3.select("#thresholdInput").property("value");
                const showLabels = d3.select("input[name='labelsInput']").property("checked");
                const showEdges = d3.select("input[name='edgesInput']").property("checked");
                drawNetwork(agg, thresholdValue, showLabels, showEdges);
                d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
            }

            let width = 1, height = 1;

            var options = {
                linkStroke: "#999",
                nodeStrokeOpacity: 1,
                linkStrokeOpacity: 0.5,
                linkStrokeLinecap: "butt",
                nodeFill: "#000",
                nodeStrokeWidth: 1,
                nodeStroke: "#fff",
                }

            const sizing = "cube"
            const sizingFunctions = {
                "cube": d => allNodes[d.id].views ** (1 / 3.),
                "square": d => allNodes[d.id].views ** (1 / 2.),
                "linear": d => allNodes[d.id].views,
                "same": d => 1
            }
            const sizingFunction = sizingFunctions[sizing]


            let currentNodes = [];
            let currentEdges = [];
            let currentIndexToXY = {};
            let currentLinkedByIndex = {};
            let currentAgg = "bipartite";
            let currentThreshold = 0;
            let currentShowLabels = true;
            let currentShowEdges = true;
            let currentSizingFunction = sizingFunctions[sizing];
            let lastHoveredNode = null;
            let currentTransform = d3.zoomIdentity;

            const formatter = Intl.NumberFormat('en', { notation: 'compact' });
            const LABEL_SIZE_THRESHOLD = 500;
            const MOBILE_BREAKPOINT = 1280;
            const MOBILE_RADIUS_FACTOR = 0.5;
            function getRadiusFactor() { return window.innerWidth < MOBILE_BREAKPOINT ? MOBILE_RADIUS_FACTOR : 1; }

            function isConnected(a, b) {
                return (
                    currentLinkedByIndex[`${a.id},${b.id}`] ||
                    currentLinkedByIndex[`${b.id},${a.id}`] ||
                    a.id === b.id
                );
            }

            function drawFrame(hoveredNode) {
                ctx.clearRect(0, 0, width, height);
                ctx.save();
                ctx.setTransform(
                    currentTransform.k, 0, 0, currentTransform.k,
                    currentTransform.x, currentTransform.y
                );

                const nodes = currentNodes;
                const links = currentEdges;
                const indexToXY = currentIndexToXY;
                const threshold = currentThreshold;
                const strokeScale = 1 / Math.sqrt(currentTransform.k);

                // Draw links in two passes so highlighted edges always appear on top (stroke scales with sqrt(zoom))
                if (currentShowEdges) {
                    ctx.lineWidth = 1 * strokeScale;
                    ctx.strokeStyle = options.linkStroke;
                    ctx.globalAlpha = options.linkStrokeOpacity;
                    for (const link of links) {
                        const highlighted = hoveredNode && (link.source === hoveredNode.id || link.target === hoveredNode.id);
                        if (highlighted) continue;
                        const src = indexToXY[link.source];
                        const tgt = indexToXY[link.target];
                        ctx.beginPath();
                        ctx.moveTo(src.x, src.y);
                        ctx.lineTo(tgt.x, tgt.y);
                        ctx.stroke();
                    }
                    ctx.strokeStyle = "#f00";
                    ctx.globalAlpha = 1;
                    ctx.lineWidth = 2 * strokeScale;
                    for (const link of links) {
                        const highlighted = hoveredNode && (link.source === hoveredNode.id || link.target === hoveredNode.id);
                        if (!highlighted) continue;
                        const src = indexToXY[link.source];
                        const tgt = indexToXY[link.target];
                        ctx.beginPath();
                        ctx.moveTo(src.x, src.y);
                        ctx.lineTo(tgt.x, tgt.y);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                    ctx.lineWidth = 1;
                }

                // Draw nodes (outline stroke scales with sqrt(zoom) so it doesn't blow up when zoomed in)
                const radiusFactor = getRadiusFactor();
                for (const node of nodes) {
                    const r = currentSizingFunction(node) * data.radiusScaling[`${currentAgg}_${threshold}`] * radiusFactor;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
                    ctx.fillStyle = nodeColor(node.category);
                    ctx.fill();
                    ctx.strokeStyle = (hoveredNode && isConnected(hoveredNode, node)) ? "#f00" : options.nodeStroke;
                    ctx.lineWidth = ((hoveredNode && isConnected(hoveredNode, node)) ? 2 : options.nodeStrokeWidth) * strokeScale;
                    ctx.stroke();
                }
                ctx.lineWidth = 1;

                if (currentShowLabels) {
                    ctx.fillStyle = "black";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    const k = currentTransform.k;
                    // Only show label when rendered size (size * zoom) meets threshold (same logic as D3)
                    for (const node of nodes) {
                        const nodeSize = currentSizingFunction(node);
                        if (nodeSize * k * radiusFactor < LABEL_SIZE_THRESHOLD * radiusFactor) continue;
                        const baseFontSize = nodeSize * data.textScaling[`${currentAgg}_${threshold}`] * radiusFactor;
                        ctx.font = `${baseFontSize}px sans-serif`;
                        ctx.fillText(node.label, node.x, node.y);
                    }
                }

                ctx.restore();
            }

            function drawNetwork(agg, threshold, showLabels, showEdges) {
                const nodes = data.layouts[`${agg}_${threshold}`].map(list => ({
                    id: list[0],
                    x: list[1],
                    y: -list[2],
                    label: allNodes[list[0]].label,
                    category: allNodes[list[0]].category
                }));

                const links = data.edges[`${agg}_${threshold}`].map((link) => ({
                    source: link[0],
                    target: link[1],
                }));

                const xExtent = d3.extent(nodes, d => +d.x);
                const yExtent = d3.extent(nodes, d => +d.y);

                const marginRatio = 0.15;
                const margin = {
                    x: (xExtent[1] - xExtent[0]) * marginRatio,
                    y: (yExtent[1] - yExtent[0]) * marginRatio
                };
                const dataMinX = xExtent[0] - margin.x;
                const dataMaxX = xExtent[1] + margin.x;
                const dataMinY = yExtent[0] - margin.y;
                const dataMaxY = yExtent[1] + margin.y;
                const dataWidth = dataMaxX - dataMinX;
                const dataHeight = dataMaxY - dataMinY;
                const scale = Math.min(width / dataWidth, height / dataHeight);
                const drawWidth = dataWidth * scale;
                const drawHeight = dataHeight * scale;
                const offsetX = (width - drawWidth) / 2;
                const offsetY = (height - drawHeight) / 2;

                const posX = d3.scaleLinear()
                    .domain([dataMinX, dataMaxX])
                    .range([offsetX, offsetX + drawWidth]);
                const posY = d3.scaleLinear()
                    .domain([dataMinY, dataMaxY])
                    .range([offsetY, offsetY + drawHeight]);

                nodes.forEach(node => {
                    node.x = posX(node.x);
                    node.y = posY(node.y);
                });

                const linkedByIndex = {};
                links.forEach(d => {
                    linkedByIndex[`${d.source},${d.target}`] = 1;
                    linkedByIndex[`${d.target},${d.source}`] = 1;
                });

                const indexToXY = nodes.reduce((map, obj) => {
                    map[obj.id] = { x: obj.x, y: obj.y };
                    return map;
                }, {});

                currentNodes = nodes;
                currentEdges = links;
                currentIndexToXY = indexToXY;
                currentLinkedByIndex = linkedByIndex;
                currentAgg = agg;
                currentThreshold = threshold;
                currentShowLabels = showLabels;
                currentShowEdges = showEdges;
                lastHoveredNode = null;
                currentTransform = d3.zoomIdentity;

                drawFrame(null);
            }

            const zoom = d3.zoom()
                .scaleExtent([1, 9])
                .translateExtent([[0, 0], [width, height]])
                .on("zoom", (event) => {
                    currentTransform = event.transform;
                    drawFrame(lastHoveredNode);
                });

            d3.select(canvas).call(zoom);

            // Single mousemove listener: only redraw when hovered node changes
            canvas.addEventListener("mousemove", function (event) {
                const rect = canvas.getBoundingClientRect();
                const screenX = event.clientX - rect.left;
                const screenY = event.clientY - rect.top;
                const mouseX = (screenX - currentTransform.x) / currentTransform.k;
                const mouseY = (screenY - currentTransform.y) / currentTransform.k;

                let hoveredNode = null;
                const radiusFactor = getRadiusFactor();
                for (let i = 0; i < currentNodes.length; i++) {
                    const node = currentNodes[i];
                    const r = currentSizingFunction(node) * data.radiusScaling[`${currentAgg}_${currentThreshold}`] * radiusFactor;
                    const dx = node.x - mouseX;
                    const dy = node.y - mouseY;
                    if (dx * dx + dy * dy <= r * r) {
                        hoveredNode = node;
                        break;
                    }
                }

                if (hoveredNode) {
                    tooltip.style.display = "block";
                    tooltip.style.left = `${event.clientX + 10}px`;
                    tooltip.style.top = `${event.clientY + 10}px`;
                    tooltip.innerHTML = `
                        <strong>${hoveredNode.label}</strong><br>
                        Category: ${hoveredNode.category}<br>
                        Views: ${formatter.format(allNodes[hoveredNode.id].views)}
                    `;
                } else {
                    tooltip.style.display = "none";
                }

                if (hoveredNode !== lastHoveredNode) {
                    lastHoveredNode = hoveredNode;
                    drawFrame(hoveredNode);
                }
            });

            // Handle controls and redraw network
            d3.selectAll(".controls input, .controls button").on("change click", function () {
                const agg = d3.select("input[name='agg']:checked").property("value");
                const thresholdValue = d3.select("#thresholdInput").property("value");
                const showLabels = d3.select("input[name='labelsInput']").property("checked");
                const showEdges = d3.select("input[name='edgesInput']").property("checked");

                drawNetwork(agg, thresholdValue, showLabels, showEdges);
                d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
            });

            // Size canvas to container and do initial draw; redraw on resize
            resizeCanvas();
            requestAnimationFrame(function () { resizeCanvas(); });
            new ResizeObserver(function () { resizeCanvas(); }).observe(canvasContainer);
        });

    </script>
</body>
